            HEADHAUL: "头程运费 (Headhaul Cost)\n• 计算方式：体积(m³) * 费率(单价)\n• 费率来源：根据上方选择的【材质/物流渠道】自动匹配\n• 示例：木质相框到英国 = 1180元/m³",
            REFERRAL: "平台佣金 (Referral Fee)\n• 计算方式：售价 * 佣金比例 (默认15%)\n• 最低佣金：£0.25 / €0.25\n• 注意：不同品类佣金比例可能不同，此处统一按15%估算，可手动调整结果。",
            PRICE: "销售定价 (Price)\n• 包含VAT的最终前台售价。\n• 输入售价后会自动反推VAT税金。",
            MARGIN: "销售毛利率 (Net Margin)\n• 公式：(净利润 / 售价) * 100%\n• 含义：每销售1块钱，实际上赚了多少钱。\n• 这是一个反映销售盈利质量的指标。",
        }
    };

    const fmt = (val, d=2) => {
        if (typeof val === 'string') return val; // Handle "不适用" string
        return (parseFloat(val) || 0).toFixed(d);
    };
    const generateId = () => Math.random().toString(36).substr(2, 9);

    const getTier = (l, w, h, wt) => {
        const dims = [l, w, h].sort((a,b) => b-a);
        const [L, W, H] = dims;
        const girth = 2 * (W + H);
        
        // 1. 特殊大件判定 (L>175 或 周长+长>360 或 重>31.5)
        if (wt > 31.5 || L > 175 || (L + girth) > 360) {
            return CONSTANTS.SIZE_TIERS.find(t => t.code === 'SPL');
        }
        for (let t of CONSTANTS.SIZE_TIERS) {
            if (t.code === 'SPL') continue;
            if (L <= t.maxL && W <= t.maxW && H <= t.maxH && wt <= t.maxWeight) return t;
        }
        return CONSTANTS.SIZE_TIERS.find(t => t.code === 'SPL');
    };

    const calculateFBA = (tierCode, weight, country, settings) => {
        let useLocalRate = true;
        if (settings.mode === 'EFN') {
            useLocalRate = (country === settings.stockLocation);
        }
        
        if (useLocalRate) {
            const tierData = CONSTANTS.FEES_LOCAL[tierCode];
            
            if (!tierData) return 0; // Safety check

            // Check if it's the SPL array mixed structure
            if (Array.isArray(tierData)) {
                 // Check if the last item is a formula object (specifically for SPL)
                const lastItem = tierData[tierData.length - 1];
                if (typeof lastItem === 'object' && !Array.isArray(lastItem) && lastItem.type === 'formula') {
                    // It's the mixed SPL structure
                    let row = tierData.find(r => Array.isArray(r) && weight <= r[0]);
                    
                    if (row) {
                         // Found in fixed tiers
                        if (country === 'UK') return row[1];
                        if (country === 'DE') return row[settings.deCee ? 2 : 3];
                        if (country === 'FR') return row[4];
                        if (country === 'IT') return row[5];
                        if (country === 'ES') return row[6];
                        return row[3];
                    } else {
                        // Use the formula at the end
                        const formulaData = lastItem;
                        const baseWt = formulaData.baseWt;
                        const chargeable = Math.max(weight, baseWt); 
                        const incrWt = Math.ceil(chargeable - baseWt); 
                        
                        let params = null;
                        if (country === 'UK') params = formulaData.params.UK;
                        else if (country === 'DE') params = settings.deCee ? formulaData.params.DE_CEE : formulaData.params.DE_Std;
                        else if (country === 'FR') params = formulaData.params.FR;
                        else if (country === 'IT') params = formulaData.params.IT;
                        else if (country === 'ES') params = formulaData.params.ES;
                        
                        if (params && params.base > 0) {
                            if (chargeable <= baseWt) return params.base;
                            return params.base + (incrWt * params.incr);
                        }
                        return 0; 
                    }
                } else {
                    // Standard array structure (SE, SP, etc)
                    let row = tierData.find(r => weight <= r[0]) || tierData[tierData.length - 1];
                    if (country === 'UK') return row[1];
                    if (country === 'DE') return row[settings.deCee ? 2 : 3];
                    if (country === 'FR') return row[4];
                    if (country === 'IT') return row[5];
                    if (country === 'ES') return row[6];
                    return row[3];
                }
            } else if (tierData.type === 'formula') {
                const baseWt = tierData.baseWt;
                const chargeable = Math.max(weight, baseWt); 
                const incrWt = Math.ceil(chargeable - baseWt); 
                
                let params = null;
                if (country === 'UK') params = tierData.params.UK;
                else if (country === 'DE') params = settings.deCee ? tierData.params.DE_CEE : tierData.params.DE_Std;
                else if (country === 'FR') params = tierData.params.FR;
                else if (country === 'IT') params = tierData.params.IT;
                else if (country === 'ES') params = tierData.params.ES;
                
                if (params) {
                    if (chargeable <= baseWt) return params.base;
                    return params.base + (incrWt * params.incr);
                }
                return 0;
            }
            return 0;
        } else {
            let feeTable = CONSTANTS.FEES_EFN_DETAIL[tierCode] || CONSTANTS.FEES_EFN_DETAIL['STP'];
            
            if (feeTable && feeTable.type === 'formula') {
                const baseWt = feeTable.baseWt;
                const chargeable = Math.max(weight, baseWt);
                const incrWt = Math.ceil(chargeable - baseWt);
                const destIsUK = (country === 'UK');
                
                const params = feeTable.params;
                let specificParams = null;
                
                if (destIsUK) {
                    specificParams = params.UK_Inbound;
                } else if (settings.stockLocation === 'UK') {
                    specificParams = params.UK_Export;
                } else {
                    // 修正逻辑：各国互发时，勾选deCee则用EU_Cross，否则用DE_Inbound(现为DE Only)
                    specificParams = settings.deCee ? params.EU_Cross : params.DE_Inbound;
                }

                if (specificParams) {
                    if (chargeable <= baseWt) return specificParams.base;
                    return specificParams.base + (incrWt * specificParams.incr);
                }
                return 0;

            } else if (Array.isArray(feeTable)) {
                let row = feeTable.find(r => weight <= r[0]) || feeTable[feeTable.length - 1];
                const destIsUK = (country === 'UK');
                
                if (destIsUK) return row[3]; // UK Inbound
                if (settings.stockLocation === 'UK') return row[4]; // UK Export
                
                // 修正逻辑：各国互发时，勾选deCee则用EU_Cross(index 1)，否则用DE_Inbound(index 2)
                return settings.deCee ? row[1] : row[2];
            }
            return 0;
        }
    };

    const calculateStorageFee = (l, w, h, country, tierCode, isPeak, storageTier) => {
        const isOversize = ['SOS', 'STOS', 'LOS', 'SPL'].includes(tierCode) || tierCode.startsWith('STOS');
        const period = isPeak ? 'high' : 'low';
        
        let baseRate = 0;
        let surcharge = 0;

        if (country === 'UK') {
            baseRate = CONSTANTS.STORAGE_RATES_BASE.UK[isOversize ? 'oversize' : 'std'][period];
            if (storageTier !== 'base') {
                surcharge = CONSTANTS.AGED_SURCHARGES.UK[storageTier] || 0;
            }
            const cubicFt = (l * w * h) / 28316.8;
            return cubicFt * (baseRate + surcharge);
        } else {
            baseRate = CONSTANTS.STORAGE_RATES_BASE.EU[isOversize ? 'oversize' : 'std'][period];
            if (storageTier !== 'base') {
                surcharge = CONSTANTS.AGED_SURCHARGES.EU[storageTier] || 0;
            }
            const cubicM = (l * w * h) / 1000000;
            return cubicM * (baseRate + surcharge);
        }
    };

    function App() {
        const [country, setCountry] = useState('UK');
        const [products, setProducts] = useState([]);
        const [history, setHistory] = useState([]);
        const [settings, setSettings] = useState({ 
            rateGBP: 9.43, rateEUR: 8.24, 
            mode: 'PAN_EU', 
            deCee: true,
            stockLocation: 'DE',
            isPeakSeason: false
        });
        
        const [showImport, setShowImport] = useState(false);
        const [showConfirmClear, setShowConfirmClear] = useState(false);
        const [infoPopup, setInfoPopup] = useState(null); 
        const [fbaTab, setFbaTab] = useState('local'); 
        const [toast, setToast] = useState({ show: false, msg: '', type: 'info' });
        const [importText, setImportText] = useState('');
        const [importCategory, setImportCategory] = useState('custom');
        const fileInputRef = useRef(null);
        const [batchConfig, setBatchConfig] = useState({ ad: 10, promo: 0, return: 5, storageTier: 'base' });
        const [targetMargin, setTargetMargin] = useState(15);
        const [marginFilter, setMarginFilter] = useState({ op: '>=', val: '' }); // Margin Filter

        const showToast = (msg, type='success') => {
            setToast({ show: true, msg, type });

        };

        const showInfo = (e, key, title) => {

            if (key === 'FBA') {
                setInfoPopup({ title, type: 'fba_table' });
            } else if (key === 'STORAGE') {
                setInfoPopup({ title, type: 'storage_table' });
            } else if (key === 'VERSION') {
                setInfoPopup({ title, type: 'version_history' });
            } else if (key === 'GUIDE') {
                setInfoPopup({ title, type: 'guide' });
            } else if (key === 'HEADHAUL') {
                setInfoPopup({ title, type: 'shipping_table' });
            } else {
                setInfoPopup({ title, type: 'text', content: CONSTANTS.TOOLTIPS[key] });
            }
        };

        useEffect(() => {
            const saved = localStorage.getItem('eu_calc_products_v6_5'); // Key updated
            if (saved) {
                try { 
                    const parsed = JSON.parse(saved);
                    const upgraded = parsed.map(p => ({
                        ...p,
                        adRate: p.adRate ?? batchConfig.ad,
                        promoRate: p.promoRate ?? batchConfig.promo,
                        returnRate: p.returnRate ?? batchConfig.return,
                        storageTier: p.storageTier ?? 'base'
                    }));
                    setProducts(upgraded);
                } catch(e) { addDefaultRow(); }
            } else {
                addDefaultRow();
            }
        }, []);

        useEffect(() => {
            localStorage.setItem('eu_calc_products_v6_5', JSON.stringify(products));
        }, [products]);

        // Reset margin filter when country changes
        useEffect(() => {
            setMarginFilter({ op: '>=', val: '' });
        }, [country]);

        const addDefaultRow = () => {
            addProduct({ name: '示例: 木质相框', cost: 25, l: 30, w: 20, h: 5, weight: 0.6, catId: 'wood_frame' });
        };

        const pushHistory = () => setHistory(prev => [...prev.slice(-10), JSON.stringify(products)]);
        const handleUndo = () => {
            if (history.length === 0) return;
            const prev = history[history.length - 1];
            setProducts(JSON.parse(prev));
            setHistory(h => h.slice(0, -1));
            showToast("已撤销上一步操作", "info");
        };

        const addProduct = (data = {}) => {
            pushHistory();
            const catId = data.catId || 'custom';
            setProducts(prev => [...prev, {
                id: generateId(),
                name: data.name || '',
                cost: data.cost || 0,
                l: data.l || 0, w: data.w || 0, h: data.h || 0, weight: data.weight || 0,
                shipCatId: catId,
                priceUK: data.priceUK || 0, priceDE: data.priceDE || 0, 
                priceFR: data.priceFR || 0, priceIT: data.priceIT || 0, priceES: data.priceES || 0,
                adRate: data.adRate ?? batchConfig.ad,
                promoRate: data.promoRate ?? batchConfig.promo,
                returnRate: data.returnRate ?? batchConfig.return,
                storageTier: data.storageTier ?? batchConfig.storageTier
            }]);
        };

        const updateRow = (id, field, value) => {
            setProducts(prev => prev.map(p => p.id === id ? { ...p, [field]: value } : p));
        };
        const removeRow = (id) => {
            pushHistory();
            setProducts(prev => prev.filter(p => p.id !== id));
        };
        const requestClear = () => setShowConfirmClear(true);
        const executeClear = () => {
            pushHistory();
            setProducts([]);
            setShowConfirmClear(false);
            showToast("所有数据已清空", "error");
        };

        const fetchRates = async () => {
            try {
                const btn = document.getElementById('rateRefreshBtn');
                if(btn) btn.classList.add('fa-spin');
                const res = await fetch('https://api.exchangerate-api.com/v4/latest/EUR');
                const data = await res.json();
                if(data && data.rates) {
                    const eurToCny = data.rates.CNY;
                    const eurToGbp = data.rates.GBP;
                    const gbpToCny = eurToCny / eurToGbp;
                    setSettings(s => ({...s, rateEUR: parseFloat(eurToCny.toFixed(2)), rateGBP: parseFloat(gbpToCny.toFixed(2))}));
                    showToast("汇率已更新", "success");
                }
                setTimeout(() => btn && btn.classList.remove('fa-spin'), 500);
            } catch(e) {
                showToast("汇率获取失败，请检查网络", "error");
                document.getElementById('rateRefreshBtn')?.classList.remove('fa-spin');
            }
        };

        const applyBatchSettings = () => {
            pushHistory();
            setProducts(prev => prev.map(p => ({
                ...p,
                adRate: batchConfig.ad, promoRate: batchConfig.promo, returnRate: batchConfig.return, storageTier: batchConfig.storageTier
            })));
            showToast("批量设置已应用", "success");
        };

        const calculatedRows = useMemo(() => {
            return products.map(p => {
                const l = parseFloat(p.l)||0, w = parseFloat(p.w)||0, h = parseFloat(p.h)||0, wt = parseFloat(p.weight)||0;
                const costCNY = parseFloat(p.cost)||0;
                const isUK = country === 'UK';
                const currency = CONSTANTS.CURRENCY[country];
                const rate = isUK ? settings.rateGBP : settings.rateEUR;
                const cat = CONSTANTS.SHIPPING_CATEGORIES.find(c => c.id === p.shipCatId) || CONSTANTS.SHIPPING_CATEGORIES[0];
                const shipRateCBM = isUK ? cat.rateUK : cat.rateEU;
                const volM3 = (l * w * h) / 1000000;
                const volWt = (l * w * h) / 5000;
                
                const tier = getTier(l,w,h,wt);
                let chargeWt = wt;
                if (tier && tier.useVol) {
                    chargeWt = Math.max(wt, volWt);
                }

                const headhaulCNY = volM3 * shipRateCBM;
                const headhaulLocal = headhaulCNY / rate;
                const price = parseFloat(p[`price${country}`]) || 0;
                const vatRate = CONSTANTS.VAT[country];
                const vatAmt = price - (price / (1 + vatRate));
                
                const refFee = Math.max(0.25, price * 0.15);
                const baseFbaFee = calculateFBA(tier ? tier.code : 'SPL', chargeWt, country, settings);
                const fuelSurcharge = baseFbaFee * CONSTANTS.FUEL_SURCHARGE_RATE;
                const fbaFee = baseFbaFee + fuelSurcharge;
                const totalStorageFee = calculateStorageFee(l, w, h, country, tier ? tier.code : 'SPL', settings.isPeakSeason, p.storageTier);
                const dstRate = CONSTANTS.DST[country] || 0;
                const dstFee = (refFee + fbaFee) * dstRate;

                const adR = p.adRate ?? 0;
                const proR = p.promoRate ?? 0;
                const retR = p.returnRate ?? 0;
                const adCost = price * (adR / 100);
                const promoCost = price * (proR / 100);
                const returnCost = price * (retR / 100);
                const totalOpCost = adCost + promoCost + returnCost;
                
                const landedCostLocal = (costCNY / rate) + headhaulLocal;
                const netProfit = price - vatAmt - refFee - fbaFee - dstFee - totalStorageFee - landedCostLocal - totalOpCost;
                const netProfitCNY = netProfit * rate;
                const margin = price > 0 ? (netProfit / price) * 100 : 0;
                
                // Calculations for export
                const costLocal = costCNY / rate;
                const procurementShare = price > 0 ? (costLocal / price) * 100 : 0;
                const headhaulShare = price > 0 ? (headhaulLocal / price) * 100 : 0;
                const fbaRefDstShare = price > 0 ? ((fbaFee + refFee + dstFee) / price) * 100 : 0;
                const vatShare = price > 0 ? (vatAmt / price) * 100 : 0;
                
                return {
                    ...p, chargeWt, volM3, price, currency, rate, shipRateCBM, headhaulLocal, landedCostLocal, costLocal,
                    vatAmt, refFee, baseFbaFee, fuelSurcharge, fbaFee, dstFee, totalStorageFee,
                    adCost, promoCost, returnCost, totalOpCost, netProfit, netProfitCNY, margin,
                    procurementShare, headhaulShare, fbaRefDstShare, vatShare,
                    adRate: adR, promoRate: proR, returnRate: retR,
                    tierName: tier ? tier.name : 'Unknown',
                    storageTier: p.storageTier || 'base'
                };
            });
        }, [products, country, settings]);

        const filteredRows = useMemo(() => {
            if (marginFilter.val === '') return calculatedRows;
            const val = parseFloat(marginFilter.val);
            if (isNaN(val)) return calculatedRows;
            return calculatedRows.filter(r => {
                if (marginFilter.op === '>=') return r.margin >= val;
                if (marginFilter.op === '<=') return r.margin <= val;
                return true;
            });
        }, [calculatedRows, marginFilter]);

        const processImportData = (rowsData) => {
            const newProds = [];
            let map = { name:-1, cost:-1, l:-1, w:-1, h:-1, wt:-1, price:-1, priceUK:-1, priceDE:-1, priceFR:-1, priceIT:-1, priceES:-1 };
            let startRow = 0;
            if (rowsData.length > 0) {
                const header = rowsData[0].map(c => String(c).toLowerCase().trim());
                const findIdx = (keywords) => header.findIndex(c => keywords.some(k => c.indexOf(k) > -1));
                map.name = findIdx(['name','sku','产品','名称']);
                map.cost = findIdx(['cost','purchase','成本','采购','出厂']);
                map.l = findIdx(['length','长','l']);
                map.w = findIdx(['width','宽','w']);
                map.h = findIdx(['height','高','h']);
                map.wt = findIdx(['weight','重','wt']);
                map.priceUK = findIdx(['price uk', 'uk price', 'gb price', '英国售价', 'united kingdom', 'great britain', 'uk', 'gb', 'gbp', '英国']);
                map.priceDE = findIdx(['price de', 'de price', 'germany', 'deutschland', '德国售价', '德国', 'de']);
                map.priceFR = findIdx(['price fr', 'fr price', 'france', '法国售价', '法国', 'fr']);
                map.priceIT = findIdx(['price it', 'it price', 'italy', 'italia', '意大利售价', '意大利', 'it']);
                map.priceES = findIdx(['price es', 'es price', 'spain', 'españa', '西班牙售价', '西班牙', 'es']);
                map.price = findIdx(['price','sell','售价']);
                if (map.name > -1 || map.cost > -1 || map.price > -1) startRow = 1;
                else map = { name:0, cost:1, l:2, w:3, h:4, wt:5, price:6 };
            }
            for(let i=startRow; i<rowsData.length; i++) {
                const row = rowsData[i];
                if (!row || row.length < 2) continue;
                const val = (idx) => {
                    if (idx === undefined || idx < 0 || idx >= row.length) return 0;
                    const v = row[idx];
                    return typeof v === 'number' ? v : (parseFloat(String(v).replace(/[^\d.]/g,'')) || 0);
                };
                const str = (idx) => (idx > -1 && row[idx]) ? String(row[idx]).trim() : '';
                const p = {
                    id: generateId(),
                    name: str(map.name) || `Import ${i}`,
                    cost: val(map.cost), l: val(map.l), w: val(map.w), h: val(map.h), weight: val(map.wt),
                    shipCatId: importCategory,
                    priceUK: 0, priceDE: 0, priceFR: 0, priceIT: 0, priceES: 0,
                    adRate: batchConfig.ad, promoRate: batchConfig.promo, returnRate: batchConfig.return,
                    storageTier: batchConfig.storageTier
                };
                if (map.priceUK > -1) p.priceUK = val(map.priceUK);
                if (map.priceDE > -1) p.priceDE = val(map.priceDE);
                if (map.priceFR > -1) p.priceFR = val(map.priceFR);
                if (map.priceIT > -1) p.priceIT = val(map.priceIT);
                if (map.priceES > -1) p.priceES = val(map.priceES);
                
                const genericPrice = val(map.price);
                if (genericPrice > 0) {
                    ['UK', 'DE', 'FR', 'IT', 'ES'].forEach(c => {
                        if (p[`price${c}`] === 0) p[`price${c}`] = genericPrice;
                    });
                }
                newProds.push(p);
            }
            if (newProds.length > 0) {
                pushHistory();
                setProducts(prev => [...prev, ...newProds]);
                setShowImport(false);
                setImportText('');
                showToast(`成功导入 ${newProds.length} 条数据`);
            } else {
                showToast('未识别到有效数据', 'error');
            }
        };

        const handlePasteImport = () => {
            if (!importText.trim()) return;
            const rows = importText.trim().split('\n').map(line => line.split(/[\t,]/));
            processImportData(rows);
        };

        const handleFileImport = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                const bstr = evt.target.result;
                const wb = XLSX.read(bstr, {type:'binary'});
                const wsname = wb.SheetNames[0];
                const ws = wb.Sheets[wsname];
                const data = XLSX.utils.sheet_to_json(ws, {header:1});
                processImportData(data);
            };
            reader.readAsBinaryString(file);
            e.target.value = '';
        };

        const handleExport = () => {
            const data = filteredRows.map(r => ({
                "产品名称": r.name, "国家": country, "采购成本": r.cost,
                "尺寸分段": r.tierName,
                "长": r.l, "宽": r.w, "高": r.h, "重量": r.weight, "计费重": r.chargeWt.toFixed(2),
                "售价": r.price, "VAT税金": r.vatAmt.toFixed(2), "FBA基础费": typeof r.baseFbaFee === 'number' ? r.baseFbaFee.toFixed(2) : r.baseFbaFee, "燃油附加费": typeof r.fuelSurcharge === 'number' ? r.fuelSurcharge.toFixed(2) : r.fuelSurcharge, "FBA费(含燃油)": typeof r.fbaFee === 'number' ? r.fbaFee.toFixed(2) : r.fbaFee, "佣金": r.refFee.toFixed(2), "DST": r.dstFee.toFixed(2), "库存费": r.totalStorageFee.toFixed(2), "库龄": r.storageTier,
                "头程": r.headhaulLocal.toFixed(2), 
                "推广费": r.adCost.toFixed(2), "促销费": r.promoCost.toFixed(2), "退货费": r.returnCost.toFixed(2),
                "毛利(Local)": r.netProfit.toFixed(2), "毛利(CNY)": r.netProfitCNY.toFixed(2), "毛利率(%)": r.margin.toFixed(2),
                "采购占比(%)": r.procurementShare.toFixed(2), "头程占比(%)": r.headhaulShare.toFixed(2), "FBA物流+佣金占比(%)": r.fbaRefDstShare.toFixed(2), "税金占比(%)": r.vatShare.toFixed(2)
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Profit");
            XLSX.writeFile(wb, `Profit_${country}.xlsx`);
        };

        const applyTargetMargin = () => {
            pushHistory();
            const targetCountries = ['UK', 'DE', 'FR', 'IT', 'ES'];
            const newProducts = products.map(p => { 
                let updatedFields = {};
                targetCountries.forEach(c => {
                    const l = parseFloat(p.l)||0, w = parseFloat(p.w)||0, h = parseFloat(p.h)||0, wt = parseFloat(p.weight)||0;
                    const costCNY = parseFloat(p.cost)||0;
                    const isUK = c === 'UK';
                    const rate = isUK ? settings.rateGBP : settings.rateEUR;
                    
                    const cat = CONSTANTS.SHIPPING_CATEGORIES.find(cat => cat.id === p.shipCatId) || CONSTANTS.SHIPPING_CATEGORIES[0];
                    const shipRateCBM = isUK ? cat.rateUK : cat.rateEU;
                    const volM3 = (l * w * h) / 1000000;
                    const chargeWt = Math.max(wt, (l * w * h) / 5000); // Simplify margin calc to always check vol
                    
                    const headhaulLocal = (volM3 * shipRateCBM) / rate;
                    const tier = getTier(l,w,h,wt);
                    const baseFbaFee = calculateFBA(tier ? tier.code : 'SPL', chargeWt, c, settings);
                    const fuelSurcharge = baseFbaFee * CONSTANTS.FUEL_SURCHARGE_RATE;
                    const fbaFee = baseFbaFee + fuelSurcharge;
                    
                    const storageFee = calculateStorageFee(l, w, h, c, tier ? tier.code : 'SPL', settings.isPeakSeason, p.storageTier);

                    const vatRate = CONSTANTS.VAT[c];
                    const dstRate = CONSTANTS.DST[c] || 0;
                    
                    const fixedCost = (costCNY / rate) + headhaulLocal + fbaFee + storageFee + (fbaFee * dstRate);
                    const refRate = 0.15;
                    const opRate = ((p.adRate??batchConfig.ad) + (p.promoRate??batchConfig.promo) + (p.returnRate??batchConfig.return)) / 100;
                    
                    const factor = (1 / (1 + vatRate)) - (refRate * (1 + dstRate)) - opRate - (targetMargin / 100);
                    
                    if (factor > 0) {
                        updatedFields[`price${c}`] = parseFloat((fixedCost / factor).toFixed(2));
                    }
                });
                return { ...p, ...updatedFields };
            });
            setProducts(newProducts);
            showToast(`已按 ${targetMargin}% 毛利率反推所有站点售价`);
        };

                                                <td>&gt; {data.baseWt}</td>

                                                    <>
                                                        <td>{data.params.UK.base} + {data.params.UK.incr}/kg</td>
                                                        <td>{data.params.DE_CEE.base} + {data.params.DE_CEE.incr}/kg</td>
                                                        <td>{data.params.DE_Std.base} + {data.params.DE_Std.incr}/kg</td>
                                                        <td>{data.params.FR.base} + {data.params.FR.incr}/kg</td>

                                                    </>

                                                        <td>{data.params.EU_Cross ? `${data.params.EU_Cross.base} + ${data.params.EU_Cross.incr}/kg` : '-'}</td>
                                                        <td>{data.params.DE_Inbound ? `${data.params.DE_Inbound.base} + ${data.params.DE_Inbound.incr}/kg` : '-'}</td>

                                        </tr>
                                    )});
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

                        <div className="flex gap-1 items-center text-xs bg-white border p-1 rounded">
                            <span className="text-slate-400 font-bold px-1">毛利:</span>
                            <select value={marginFilter.op} onChange={e=>setMarginFilter({...marginFilter, op:e.target.value})} className="border rounded h-6 bg-slate-50 text-center">
                                <option value=">=">≥</option>
                                <option value="<=">≤</option>
                            </select>
                            <input type="number" value={marginFilter.val} onChange={e=>setMarginFilter({...marginFilter, val:e.target.value})} className="w-10 border rounded text-center h-6" placeholder="数值"/>%
                            {marginFilter.val !== '' && <button onClick={()=>setMarginFilter({...marginFilter, val:''})} className="text-slate-400 hover:text-red-500 px-1"><i className="fas fa-times"></i></button>}
                        </div>
                        <div className="flex gap-1 items-center text-xs bg-white border p-1 rounded">
                            <span className="text-slate-400 font-bold px-1">反推:</span>
                            <input type="number" value={targetMargin} onChange={e=>setTargetMargin(e.target.value)} className="w-10 border rounded text-center"/>%
                            <button onClick={applyTargetMargin} className="bg-indigo-600 text-white px-2 py-0.5 rounded hover:bg-indigo-700 ml-1">执行</button>
                        </div>
                    </div>
                </div>

                <div className="container mx-auto px-4 overflow-x-auto pb-12">
                    <div className="bg-white rounded border shadow min-w-[1300px]">
                        <table className="w-full metric-table">
                            <thead>
                                <tr>
                                    <th className="w-8">#</th>
                                    <th className="w-96 text-left pl-2">产品名称</th>
                                    <th className="w-20 bg-slate-50">采购(CNY)</th>
                                    <th className="w-32 bg-orange-50">材质/物流</th>
                                    <th className="w-14">尺寸(cm)</th>
                                    <th className="w-14">重(kg)</th>
                                    <th className="w-16 bg-slate-50">
                                        计费重 <i className="fas fa-question-circle help-icon" onClick={(e)=>showInfo(e,'CHARGE_WT','计费重 (Chargeable Weight)')}></i>
                                    </th>
                                    <th className="w-16 text-orange-600">
                                        头程 <i className="fas fa-question-circle help-icon" onClick={(e)=>showInfo(e,'HEADHAUL','头程运费 (Headhaul)')}></i>
                                    </th>
                                    <th className="w-24 bg-blue-50 border-l-2 border-blue-400 text-blue-800">
                                        售价 <i className="fas fa-question-circle help-icon" onClick={(e)=>showInfo(e,'PRICE','销售定价 (Price)')}></i>
                                    </th>
                                    <th className="w-16">
                                        FBA配送 <i className="fas fa-question-circle help-icon" onClick={(e)=>showInfo(e,'FBA','FBA配送费率表 (2026)')}></i><div className="text-[9px] font-normal text-slate-400">含燃油1.5%</div>
                                    </th>
                                    <th className="w-16">
                                        平台佣金 <i className="fas fa-question-circle help-icon" onClick={(e)=>showInfo(e,'REFERRAL','平台佣金 (Referral Fee)')}></i>
                                    </th>
                                    <th className="w-16 bg-gray-50" title="数字服务费">
                                        DST <i className="fas fa-question-circle help-icon" onClick={(e)=>showInfo(e,'DST','数字服务费 (DST)')}></i>
                                    </th>
                                    <th className="w-32 text-purple-600">
                                        库存费 <i className="fas fa-question-circle help-icon" onClick={(e)=>showInfo(e,'STORAGE','月度仓储费率表')}></i>
                                        <div className="text-[9px] font-normal text-slate-400">库龄档位</div>
                                    </th>
                                    <th className="w-24 bg-yellow-50">运营推广</th>
                                    <th className="w-24 bg-emerald-50 border-l-2 border-emerald-400 text-emerald-800">
                                        毛利<br/><span className="font-normal text-[10px] text-emerald-600">Local / CNY</span>
                                    </th>
                                    <th className="w-14 bg-emerald-50 text-emerald-800">
                                        毛利率 <i className="fas fa-question-circle help-icon text-[10px]" onClick={(e)=>showInfo(e,'MARGIN','销售毛利率 (Margin)')}></i>
                                    </th>
                                    <th className="w-8"></th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredRows.map((row, idx) => (
                                    <tr key={row.id}>
                                        <td className="text-center text-slate-400 text-xs">{idx + 1}</td>
                                        <td className="pl-2">
                                            <input className="input-cell text-left font-medium" value={row.name} onChange={e => updateRow(row.id, 'name', e.target.value)} />
                                            <div className="text-[10px] text-slate-400 mt-0.5">{row.tierName}</div>
                                        </td>
                                        <td className="bg-slate-50 relative">
                                            <input className="input-cell font-medium" value={row.cost} onChange={e => updateRow(row.id, 'cost', e.target.value)} />
                                            <div className="text-[9px] text-slate-500 text-center absolute bottom-0.5 w-full">{row.currency} {fmt(row.costLocal)}</div>
                                        </td>
                                        <td>
                                            <select 
                                                className="w-full text-xs border-none bg-transparent outline-none text-center h-full cursor-pointer text-slate-600"
                                                value={row.shipCatId}
                                                onChange={e => updateRow(row.id, 'shipCatId', e.target.value)}
                                            >
                                                {CONSTANTS.SHIPPING_CATEGORIES.map(cat => (
                                                    <option key={cat.id} value={cat.id}>{cat.name}</option>
                                                ))}
                                            </select>
                                        </td>
                                        <td><div className="input-group-cell"><input value={row.l} onChange={e=>updateRow(row.id,'l',e.target.value)}/><input value={row.w} onChange={e=>updateRow(row.id,'w',e.target.value)}/><input value={row.h} onChange={e=>updateRow(row.id,'h',e.target.value)}/></div></td>
                                        <td><input className="input-cell" value={row.weight} onChange={e=>updateRow(row.id,'weight',e.target.value)}/></td>
                                        <td className="bg-slate-50 text-center text-slate-600 text-xs">{fmt(row.chargeWt, 2)}</td>
                                        <td className="text-center text-xs text-orange-600 relative">
                                            <div>{row.currency} {fmt(row.headhaulLocal)}</div>
                                            <div className="text-[9px] text-orange-400">¥{fmt(row.headhaulLocal * row.rate, 0)}</div>
                                        </td>
                                        <td className="bg-blue-50/50 border-l-2 border-blue-400 relative">
                                            <input className="input-cell font-bold text-blue-700" value={row.price} onChange={e=>updateRow(row.id, `price${country}`, e.target.value)} />
                                            <div className="text-[9px] text-slate-400 text-center absolute bottom-0.5 w-full">VAT -{fmt(row.vatAmt)}</div>
                                        </td>
                                        <td className="text-center text-xs text-red-500 font-medium"><div>-{fmt(row.fbaFee)}</div><div className="text-[9px] text-red-300">燃油 {fmt(row.fuelSurcharge)}</div></td>
                                        <td className="text-center text-xs text-red-400">-{fmt(row.refFee)}</td>
                                        <td className="text-center text-xs text-gray-500 bg-gray-50">-{fmt(row.dstFee)}</td>
                                        <td className="text-center text-xs text-purple-600">
                                            <div>-{fmt(row.totalStorageFee)}</div>
                                            <select className="tier-select text-center" 
                                                value={row.storageTier} 
                                                onChange={e=>updateRow(row.id, 'storageTier', e.target.value)}
                                            >
                                                {CONSTANTS.STORAGE_TIERS_OPTIONS.map(opt => (
                                                    <option key={opt.id} value={opt.id}>{opt.name}</option>
                                                ))}
                                            </select>
                                        </td>
                                        <td className="bg-yellow-50/50 text-xs text-slate-500 px-1 leading-tight">
                                            <div className="flex justify-between"><span>广</span><span>{fmt(row.adCost)}</span></div>
                                            <div className="flex justify-between"><span>促</span><span>{fmt(row.promoCost)}</span></div>
                                            <div className="flex justify-between border-t border-yellow-200 mt-0.5 pt-0.5"><span>退</span><span>{fmt(row.returnCost)}</span></div>
                                        </td>
                                        <td className={`bg-emerald-50/50 border-l-2 border-emerald-400 text-right pr-2 ${row.netProfit > 0 ? 'text-profit-pos' : 'text-profit-neg'}`}>
                                            <div className="text-xs text-slate-500">{row.currency} {fmt(row.netProfit)}</div>
                                            <div className="text-sm">¥{fmt(row.netProfitCNY, 1)}</div>
                                        </td>
                                        <td className={`text-center font-bold text-xs bg-emerald-50/30 ${row.margin > 0 ? 'text-profit-pos' : 'text-profit-neg'}`}>{fmt(row.margin, 1)}%</td>
                                        <td className="text-center"><button onClick={() => removeRow(row.id)} className="text-slate-300 hover:text-red-500 px-1"><i className="fas fa-times"></i></button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {products.length === 0 && <div className="text-center py-12 text-gray-400 text-sm">暂无数据，请添加或导入</div>}
                    </div>
                </div>

                {/* 清空确认弹窗 */}
                {showConfirmClear && (
                    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center modal-enter">
                        <div className="bg-white rounded-lg p-6 w-80 text-center shadow-xl">
                            <i className="fas fa-exclamation-triangle text-red-500 text-4xl mb-4"></i>
                            <h3 className="text-lg font-bold text-slate-800 mb-2">确定清空所有数据?</h3>
                            <p className="text-sm text-slate-500 mb-6">此操作将删除当前列表中的所有产品，且无法撤销。</p>
                            <div className="flex justify-center gap-3">
                                <button onClick={() => setShowConfirmClear(false)} className="px-4 py-2 border rounded text-slate-600 hover:bg-slate-50 text-sm">取消</button>
                                <button onClick={executeClear} className="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded text-sm">确认清空</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* 导入弹窗 */}
                {showImport && (
                    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center modal-enter">
                        <div className="bg-white rounded-lg p-6 w-[550px] shadow-xl">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-lg font-bold text-slate-800">批量导入数据</h3>
                                <button onClick={() => setShowImport(false)} className="text-slate-400 hover:text-red-500"><i className="fas fa-times"></i></button>
                            </div>
                            <div className="mb-4">
                                <label className="block text-sm font-bold text-slate-700 mb-2">1. 选择产品材质 (用于匹配海运费)</label>
                                <div className="grid grid-cols-2 gap-2 text-xs">
                                    {CONSTANTS.SHIPPING_CATEGORIES.map(cat => (
                                        <label key={cat.id} className={`cursor-pointer border rounded p-2 flex items-center gap-2 ${importCategory === cat.id ? 'border-blue-500 bg-blue-50 ring-1 ring-blue-200' : 'hover:border-blue-300'}`}>
                                            <input type="radio" checked={importCategory === cat.id} onChange={() => setImportCategory(cat.id)} className="text-blue-600"/>
                                            <div><div className="font-bold">{cat.name}</div><div className="text-slate-400 scale-90 origin-left">UK:{cat.rateUK} EU:{cat.rateEU}</div></div>
                                        </label>
                                    ))}
                                </div>
                            </div>
                            <div className="mb-4">
                                <p className="text-xs text-gray-500 mb-2">2. 支持 Excel/CSV 列名识别: <br/><span className="bg-slate-100 px-1 rounded">产品名称</span> <span className="bg-slate-100 px-1 rounded">采购成本</span> <span className="bg-slate-100 px-1 rounded">长</span> <span className="bg-slate-100 px-1 rounded">宽</span> <span className="bg-slate-100 px-1 rounded">高</span> <span className="bg-slate-100 px-1 rounded">重量</span> <span className="bg-blue-100 text-blue-800 px-1 rounded">售价(UK/DE/..)</span></p>
                                <textarea className="w-full h-24 border p-2 text-xs font-mono rounded focus:border-blue-500 outline-none" placeholder="在此处粘贴 Excel 数据..." value={importText} onChange={e=>setImportText(e.target.value)}></textarea>
                            </div>
                            <div className="flex justify-between items-center pt-2 border-t">
                                <label className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-xs cursor-pointer flex gap-1 items-center transition-colors">
                                    <i className="fas fa-file-excel"></i> 上传 Excel 文件
                                    <input type="file" accept=".xlsx, .xls" className="hidden" onChange={handleFileImport} ref={fileInputRef} />
                                </label>
                                <div className="flex gap-2">
                                    <button onClick={() => setShowImport(false)} className="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded text-xs transition-colors">取消</button>
                                    <button onClick={handlePasteImport} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-xs shadow-sm transition-colors">识别粘贴文本</button>
                                </div>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
