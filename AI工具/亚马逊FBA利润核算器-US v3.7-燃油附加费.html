        const callGeminiWithBackoff = async (apiKey, prompt, retries = 5, delay = 1000) => {
          if (!apiKey) throw new Error("请输入 API Key");
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
          const payload = { contents: [{ parts: [{ text: prompt }] }] };
          for (let i = 0; i < retries; i++) {
            try {
              const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              if (!response.ok) throw new Error(`API Error: ${response.status}`);
              const data = await response.json();
              return data.candidates?.[0]?.content?.parts?.[0]?.text || "无结果";
            } catch (error) {
              if (i === retries - 1) throw error;
              await new Promise(resolve => setTimeout(resolve, delay * Math.pow(2, i)));
            }
          }
        };

              if (weight_lb > 150) { sizeTier = 'extra_150_plus'; sizeTierName = "超大 150lb+"; }
              else if (calcWeightForTier <= 50) { sizeTier = 'extra_0_50'; sizeTierName = "超大 0-50lb"; }
              else if (calcWeightForTier <= 70) { sizeTier = 'extra_50_70'; sizeTierName = "超大 50-70lb"; }
              else if (calcWeightForTier <= 150) { sizeTier = 'extra_70_150'; sizeTierName = "超大 70-150lb"; }
              else { sizeTier = 'extra_70_150'; sizeTierName = "超大 70-150lb"; }
            }

            let feeWeight = 0;
            let weightTypeUsed = '实重';
            
            if (sizeTier === 'small_std' || sizeTier === 'extra_150_plus') {
                feeWeight = weight_lb; weightTypeUsed = '实重';
            } else {
                feeWeight = calcWeightForTier;
                if (dimWeight > weight_lb) weightTypeUsed = '体积重';
            }

            let priceTier = 'between_10_50';
            if (row.price < 10) priceTier = 'under_10';
            else if (row.price > 50) priceTier = 'over_50';

            let rates = FBA_FEES_2026_EST[season]?.[priceTier] || FBA_FEES_2026_EST['non_peak']['between_10_50'];

            let fbaFee = 0;
            const weightOz = feeWeight * 16;
            if (sizeTier === 'small_std') {
              for (let tier of rates.small_std) { if (weightOz <= tier.max_oz) { fbaFee = tier.fee; break; } }
            } else if (sizeTier === 'large_std') {
              let found = false;
              if (weightOz <= 16) { for (let tier of rates.large_std) { if (tier.max_oz && weightOz <= tier.max_oz) { fbaFee = tier.fee; found = true; break; } } }
              if (!found && feeWeight <= 3) { for (let tier of rates.large_std) { if (tier.max_lb && feeWeight <= tier.max_lb) { fbaFee = tier.fee; found = true; break; } } }
              if (!found) {
                const over3Logic = rates.large_std[rates.large_std.length - 1];
                const extraWeight = feeWeight - 3;
                fbaFee = over3Logic.base + (Math.ceil(extraWeight / 0.25) * over3Logic.step);
              }
            } else {
              let tierConfig = null;
              if (sizeTier === 'small_bulky') tierConfig = rates.bulky.small;
              else if (sizeTier === 'large_bulky') tierConfig = rates.bulky.large;
              else if (sizeTier === 'extra_0_50') tierConfig = rates.bulky.extra_0_50;
              else if (sizeTier === 'extra_50_70') tierConfig = rates.bulky.extra_50_70;
              else if (sizeTier === 'extra_70_150') tierConfig = rates.bulky.extra_70_150;
              else if (sizeTier === 'extra_150_plus') tierConfig = rates.bulky.extra_150_plus;
              if (tierConfig) {
                const extraW = feeWeight > tierConfig.base_weight ? feeWeight - tierConfig.base_weight : 0;
                fbaFee = tierConfig.base + (Math.ceil(extraW) * tierConfig.per_lb);
              }
            }

            let handlingSurcharge = 0;
            if (EXTRA_LARGE_SURCHARGE[sizeTier]) handlingSurcharge = EXTRA_LARGE_SURCHARGE[sizeTier];
            
            let sippFee = 0;
            let sippDiscount = 0;

            if (row.isSIPP) {
                if (sizeTier === 'small_std') {
                    sippDiscount = 0.08; 
                } else if (sizeTier === 'large_std') {
                    if (feeWeight < 1) sippDiscount = 0.09;
                    else if (feeWeight < 2) sippDiscount = 0.25;
                    else if (feeWeight < 5) sippDiscount = 0.50;
                    else sippDiscount = 1.00;
                }
            } else {
                if (sizeTier === 'small_bulky' || sizeTier === 'large_bulky') {
                    const packFeeObj = BULKY_PACKAGING_FEES.find(t => feeWeight <= t.max);
                    sippFee = packFeeObj ? packFeeObj.fee : 4.04;
                }
            }

            const finalFbaFee = fbaFee + handlingSurcharge + sippFee - sippDiscount;
            const fuelSurcharge = parseFloat((finalFbaFee * FUEL_SURCHARGE_RATE).toFixed(2));
            const finalFbaFeeWithFuel = finalFbaFee + fuelSurcharge;

            let placementFee = 0;
            if (sizeTier.includes('bulky') || sizeTier.includes('extra')) { placementFee = 0; }
            else if (useSinglePoint) {
              if (sizeTier === 'small_std') placementFee = PLACEMENT_FEES_2026.small_std;
              else if (sizeTier === 'large_std') {
                const placementTier = PLACEMENT_FEES_2026.large_std.find(t => feeWeight <= t.max_lb);
                placementFee = placementTier ? placementTier.fee : 1.90;
              }
            }

            const safeExchangeRate = exchangeRate || 1;
            const productCostUSD = row.productCostRMB / safeExchangeRate;
            
            const catRates = SHIPPING_RATES_CN[row.category] || SHIPPING_RATES_CN['wood_frame'];
            const shippingRateRMB = !sizeTier.includes('std') ? catRates.bulky : catRates.std;
            
            const volumeCBM = (row.length_cm * row.width_cm * row.height_cm) / 1000000;
            const shippingCostRMB = (volumeCBM * shippingRateRMB); 
            
            // 1. Calculate RAW values (float)
            let shippingCostUSD_Raw = shippingCostRMB / safeExchangeRate;
            
            const cubicFeet = (l_in * w_in * h_in) / 1728;
            const isOversize = !sizeTier.includes('std');
            const baseStorageRate = isOversize ? STORAGE_RATES[season].oversize : STORAGE_RATES[season].standard;
            let surchargeRate = 0;
            const surchargeTable = isOversize ? STORAGE_SURCHARGE.oversize : STORAGE_SURCHARGE.standard;
            if (row.utilization > 22) { for (let tier of surchargeTable) { if (row.utilization <= tier.weeks) { surchargeRate = tier.fee; break; } } }
            let monthlyStorageFee_Raw = cubicFeet * (baseStorageRate + surchargeRate);

            // 2. ROUND specific fees to 2 decimals for calculation (WYSIWYG)
            const shippingCostUSD = parseFloat(shippingCostUSD_Raw.toFixed(2));
            const monthlyStorageFee = parseFloat(monthlyStorageFee_Raw.toFixed(2));

            const referralFee = row.price * (row.referralRate / 100);
            const adCost = row.price * (row.adRate / 100);
            const promoCost = row.price * (row.promoRate / 100);
            const returnLoss = row.price * (row.returnRate / 100);
            
            const totalCost = productCostUSD + shippingCostUSD + referralFee + finalFbaFeeWithFuel + placementFee + monthlyStorageFee + adCost + promoCost + returnLoss;
            const profit = row.price - totalCost;
            const margin = row.price > 0 ? (profit / row.price) * 100 : 0;

            let tierLabel = '<$10';
            if (priceTier === 'between_10_50') tierLabel = '$10-$50';

            let logicStr = `分段:${sizeTierName} | 费率:${tierLabel} | 计重:${feeWeight.toFixed(2)}lb`;
            if (handlingSurcharge > 0) logicStr += ` | 超大费:$${handlingSurcharge}`;
            if (sippFee > 0) logicStr += ` | 包装费(无SIPP):$${sippFee}`;
            if (sippDiscount > 0) logicStr += ` | SIPP折扣:-$${sippDiscount}`;
            if (fuelSurcharge > 0) logicStr += ` | 燃油附加费:$${fuelSurcharge.toFixed(2)}(FBA×3.5%)`;

            return {
              ...row, sizeTier, sizeTierName, weightTypeUsed, feeWeight: feeWeight.toFixed(2), dimWeight: dimWeight.toFixed(2),
              shippingCostUSD: shippingCostUSD.toFixed(2), // Display string
              fbaFee: finalFbaFeeWithFuel.toFixed(2), baseFbaFee: fbaFee.toFixed(2),

              storageFee: monthlyStorageFee.toFixed(2), // Display string
              surchargeAmount: (cubicFeet * surchargeRate).toFixed(2), surchargeRate,
              referralFee: referralFee.toFixed(2), adCost: adCost.toFixed(2), promoCost: promoCost.toFixed(2), returnLoss: returnLoss.toFixed(2),
              profit: profit.toFixed(2), margin: margin.toFixed(1), calcLogic: logicStr, tierLabel,
              productCostUSD, 
              shippingCostUSD_Num: shippingCostUSD, 
              placementFee, 
              storageFee_Num: monthlyStorageFee,
              finalFbaFee,
              finalFbaFeeWithFuel
            };
          };
          
          // Reverse Calculate Price Logic (Iterative)
          const reverseCalculatePrice = () => {
              const targetMarginDecimal = targetMargin / 100;
              const updatedRows = rows.map(row => {

                      const variableRate = (row.referralRate + row.returnRate + row.adRate + row.promoRate) / 100;
                      const denominator = 1 - variableRate - targetMarginDecimal;
                      if (denominator <= 0.01) break;
                      const newPrice = fixedCost / denominator;
                      if (Math.abs(newPrice - currentPrice) < 0.05) { currentPrice = newPrice; break; }
                      currentPrice = newPrice;
                  }
                  return { ...row, price: parseFloat(currentPrice.toFixed(2)) };

                          <React.Fragment key={row.id}>
                          <tr className="bg-white border-b hover:bg-gray-50">
                            <td className="px-2 py-2 sticky left-0 bg-white z-10 shadow-r border-r">
                              <input type="text" value={row.name} onChange={(e) => updateRow(row.id, 'name', e.target.value)} className="w-full bg-transparent border-b border-dashed border-gray-300 focus:border-blue-500 outline-none text-xs font-bold" />
                              <div className="mt-1">
                                <select value={row.category} onChange={(e) => updateRow(row.id, 'category', e.target.value)} className="w-full text-[10px] border rounded bg-gray-50">
                                  {Object.entries(SHIPPING_RATES_CN).map(([key, val]) => <option key={key} value={key}>{val.name}</option>)}
                                </select>
                              </div>
                              <div className="mt-1 flex items-center gap-1 text-[10px] text-gray-500">
                                <span>周转:</span>
                                <input type="number" value={row.utilization} onChange={(e) => updateRow(row.id, 'utilization', parseFloat(e.target.value) || 0)} className="w-8 border-b text-center bg-transparent focus:border-blue-500 outline-none" />
                                <span>周</span>
                              </div>
                              <div className="text-[9px] text-gray-400 mt-1 flex flex-col">
                                 <span className="text-blue-600 font-medium">费率: {res.tierLabel}</span>
                              </div>
                            </td>
                            <td className="px-2 py-2 bg-blue-50/30"><input type="number" value={row.price} onChange={(e) => updateRow(row.id, 'price', e.target.value)} className="w-full text-center bg-transparent outline-none" /></td>
                            <td className="px-2 py-2 bg-blue-50/30"><input type="number" value={row.productCostRMB} onChange={(e) => updateRow(row.id, 'productCostRMB', e.target.value)} className="w-full text-center bg-transparent outline-none" /></td>
                            <td className="px-2 py-2"><input type="number" value={row.weight_kg} onChange={(e) => updateRow(row.id, 'weight_kg', e.target.value)} className="w-full text-center bg-transparent outline-none" /></td>
                            <td className="px-2 py-2">
                                <div className="flex gap-1 justify-center items-center">
                                    <input type="number" className="w-12 text-center border-b text-xs" value={row.length_cm} onChange={(e) => updateRow(row.id, 'length_cm', e.target.value)} />
                                    <span className="text-gray-300">x</span>
                                    <input type="number" className="w-12 text-center border-b text-xs" value={row.width_cm} onChange={(e) => updateRow(row.id, 'width_cm', e.target.value)} />
                                    <span className="text-gray-300">x</span>
                                    <input type="number" className="w-12 text-center border-b text-xs" value={row.height_cm} onChange={(e) => updateRow(row.id, 'height_cm', e.target.value)} />
                                </div>
                                <div className="text-[9px] text-blue-600 text-center mt-1 font-medium">{res.sizeTierName}</div>
                            </td>
                            <td className="px-2 py-2 text-center bg-purple-50/30 text-xs">${res.shippingCostUSD}</td>
                            <td className="px-2 py-2 text-center text-orange-700 bg-orange-50/30 relative">
                                <div className="text-xs font-bold">${res.fbaFee}</div>
                                <div className="text-[8px] text-gray-500 scale-90">含燃油${res.fuelSurcharge}</div>
                                <div className="text-[8px] text-gray-500 scale-90">计:{res.feeWeight}lb</div>
                                {res.handlingSurcharge > 0 && <div className="text-[8px] text-red-500 scale-90">+超大${res.handlingSurcharge}</div>}
                                {res.sippFee > 0 && <div className="text-[8px] text-red-500 scale-90">+包${res.sippFee}</div>}
                                {res.sippDiscount > 0 && <div className="text-[8px] text-green-600 scale-90">-SIPP${res.sippDiscount}</div>}
                                <div className="absolute top-1 right-1">
                                    <button 
                                        onClick={() => updateRow(row.id, 'isSIPP', !row.isSIPP)}
                                        className={`flex items-center gap-1 text-[8px] border rounded px-1 ${row.isSIPP ? 'bg-green-100 text-green-700 border-green-300' : 'bg-gray-100 text-gray-400 border-gray-200'}`}
                                        title={row.isSIPP ? "已SIPP认证" : "未SIPP认证"}
                                    >
                                        <PackageCheck className="w-3 h-3" />
                                        {row.isSIPP ? "SIPP" : "No"}
                                    </button>
                                </div>
                            </td>
                            <td className="px-2 py-2 text-center text-orange-800 bg-orange-100/50 text-xs font-medium">${res.placementFee}</td>
                            <td className="px-2 py-2 text-center text-gray-700 bg-orange-50/30 relative text-xs">
                                <div>${res.storageFee}</div>
                                {res.surchargeRate > 0 && <div className="text-[8px] text-red-500 scale-90">+附加费</div>}
                            </td>
                            <td className="px-2 py-2 bg-yellow-50/30 text-[10px]">
                              <div className="grid grid-cols-2 gap-x-2 gap-y-1">
                                <div className="flex flex-col">
                                    <div className="flex items-center gap-0.5"><span className="text-gray-500">佣</span><input type="number" value={row.referralRate} onChange={(e)=>updateRow(row.id,'referralRate',e.target.value)} className="w-10 border-b bg-transparent text-center" /><span className="text-gray-400">%</span></div>
                                    <div className="text-gray-600 pl-3">${res.referralFee}</div>
                                </div>
                                <div className="flex flex-col">
                                    <div className="flex items-center gap-0.5"><span className="text-gray-500">退</span><input type="number" value={row.returnRate} onChange={(e)=>updateRow(row.id,'returnRate',e.target.value)} className="w-10 border-b bg-transparent text-center" /><span className="text-gray-400">%</span></div>
                                    <div className="text-gray-600 pl-3">${res.returnLoss}</div>
                                </div>
                                <div className="flex flex-col">
                                    <div className="flex items-center gap-0.5"><span className="text-gray-500">推</span><input type="number" value={row.adRate} onChange={(e)=>updateRow(row.id,'adRate',e.target.value)} className="w-10 border-b bg-transparent text-center" /><span className="text-gray-400">%</span></div>
                                    <div className="text-gray-600 pl-3">${res.adCost}</div>
                                </div>
                                <div className="flex flex-col">
                                    <div className="flex items-center gap-0.5"><span className="text-gray-500">促</span><input type="number" value={row.promoRate} onChange={(e)=>updateRow(row.id,'promoRate',e.target.value)} className="w-10 border-b bg-transparent text-center" /><span className="text-gray-400">%</span></div>
                                    <div className="text-gray-600 pl-3">${res.promoCost}</div>
                                </div>
                              </div>
                            </td>
                            <td className={`px-2 py-2 text-center font-bold bg-green-50/30 ${res.profit < 0 ? 'text-red-600' : 'text-green-600'}`}>${res.profit}</td>
                            <td className={`px-2 py-2 text-center font-bold bg-green-50/30 ${res.profit < 0 ? 'text-red-600' : 'text-green-600'}`}>{res.margin}%</td>
                            <td className="px-2 py-2 text-center">
                                <div className="flex justify-center gap-2">
                                    <button onClick={() => handleAiAnalysis(row)} disabled={aiLoading[row.id]} className="text-purple-500 hover:text-purple-700 disabled:opacity-50" title="AI诊断">{aiLoading[row.id] ? <Loader2 className="w-3 h-3"/> : <Sparkles className="w-3 h-3"/>}</button>
                                    <button onClick={() => deleteRow(row.id)} className="text-gray-400 hover:text-red-500"><Trash2 className="w-3 h-3" /></button>
                                </div>
                            </td>
                          </tr>
                          {aiAnalysis[row.id] && (
                            <tr className="bg-purple-50 border-b">
                                <td colSpan="14" className="px-4 py-3 relative">
                                    <button onClick={() => {const n={...aiAnalysis};delete n[row.id];setAiAnalysis(n)}} className="absolute top-2 right-2 text-gray-400"><XCircle className="w-4 h-4" /></button>
                                    <div className="flex gap-2 items-start text-xs text-gray-700">
                                        <Sparkles className="w-4 h-4 text-purple-600 flex-shrink-0 mt-0.5" />
                                        <div className="whitespace-pre-wrap font-medium">{aiAnalysis[row.id]}</div>
                                    </div>
                                </td>
                            </tr>
                          )}
                          </React.Fragment>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <div className="bg-gray-100 p-4 border-t flex justify-between items-center">
                  <button onClick={addRow} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow text-sm"><Plus className="w-4 h-4" /> 添加产品</button>
                  <div className="text-xs text-gray-500 text-right"><Info className="w-3 h-3 inline mr-1" />小号标准件按实重; 其他按 实重/体积重(139) 取大值</div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AmazonProfitCalculator />);
    </script>
</body>
</html>
