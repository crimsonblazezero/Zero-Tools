    h1, .page-title, .hero-title {

        letter-spacing: var(--tracking-body-sm) !important;

                                {/* Tabs for Jiandaoyun SOP */}
                                <div className="flex justify-center mb-8">
                                    <div className="bg-white p-1.5 rounded-xl border border-slate-200 shadow-sm inline-flex flex-wrap gap-1 justify-center">
                                        {[
                                            { id: 'development', label: '新品开发流程', icon: 'workflow' },
                                            { id: 'ordering', label: '下单流程', icon: 'file-input' },
                                            { id: 'shipping', label: '运营-出货资料', icon: 'truck' },
                                            { id: 'taicang', label: '太仓备货单', icon: 'box' },
                                            { id: 'skuChange', label: 'SKU变更', icon: 'refresh-cw' },
                                            { id: 'clearance', label: '秒杀清仓申请', icon: 'percent' }
                                        ].map(tab => (
                                            <button
                                                key={tab.id}
                                                onClick={() => setActiveJiandaoyunTab(tab.id)}
                                                className={`
                                                    px-4 py-2.5 rounded-lg flex items-center gap-2 text-sm font-bold transition-all duration-200 whitespace-nowrap
                                                    ${activeJiandaoyunTab === tab.id 
                                                        ? 'bg-orange-600 text-white shadow-md' 
                                                        : 'text-slate-500 hover:bg-slate-100 hover:text-slate-700'}
                                                `}
                                            >
                                                <Icon name={tab.icon} className="w-4 h-4" />
                                                {tab.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Flowchart Container (With Zoom) */}
                                <div className="bg-white rounded-3xl border border-slate-200 shadow-2xl p-8 min-h-[800px] flex flex-col items-center relative overflow-hidden">
                                     {/* Zoom Controls */}
                                     <div className="absolute top-4 right-4 flex flex-col gap-2 z-10">
                                        <button 
                                            onClick={() => setZoomLevel(prev => Math.min(prev + 0.1, 2))}
                                            className="p-2 bg-white border border-slate-200 rounded-lg shadow-sm hover:bg-slate-50 text-slate-600"
                                            title="放大"
                                        >
                                            <Icon name="zoom-in" className="w-5 h-5" />
                                        </button>
                                        <button 
                                            onClick={() => setZoomLevel(prev => Math.max(prev - 0.1, 0.5))}
                                            className="p-2 bg-white border border-slate-200 rounded-lg shadow-sm hover:bg-slate-50 text-slate-600"
                                            title="缩小"
                                        >
                                            <Icon name="zoom-out" className="w-5 h-5" />
                                        </button>
                                        <button 
                                            onClick={() => setZoomLevel(1)}
                                            className="p-2 bg-white border border-slate-200 rounded-lg shadow-sm hover:bg-slate-50 text-slate-600"
                                            title="重置"
                                        >
                                            <Icon name="move" className="w-5 h-5" />
                                        </button>
                                        <div className="bg-slate-800 text-white text-xs py-1 px-2 rounded text-center font-mono">
                                            {Math.round(zoomLevel * 100)}%
                                        </div>
                                    </div>

                                    <div className="w-full h-full overflow-auto flex flex-col items-center">
                                        <div 
                                            style={{ 
                                                transform: `scale(${zoomLevel})`, 
                                                transformOrigin: 'top center',
                                                transition: 'transform 0.2s ease-out',
                                                paddingTop: '20px',
                                                paddingBottom: '20px'
                                            }}
                                            className="flex flex-col items-center w-full"
                                        >
                                            <h2 className="text-2xl font-bold text-slate-800 mb-8 flex items-center gap-2">
                                                <Icon name="workflow" className="w-6 h-6 text-orange-600" />
                                                {tabLabels[activeJiandaoyunTab]} 流程图
                                            </h2>
                                            
                                            <div className="flex flex-col items-center space-y-2 w-full max-w-2xl">
                                                {JIANDAOYUN_FLOWS[activeJiandaoyunTab].map((node, index) => (
                                                    <React.Fragment key={node.id}>
                                                        <FlowNode data={node} />
                                                        
                                                        {/* Render Down Arrow if not last */}
                                                        {index < JIANDAOYUN_FLOWS[activeJiandaoyunTab].length - 1 && node.type !== 'decision' && (
                                                            <div className="h-8 w-px bg-slate-300 my-1"></div>
                                                        )}

                                                        {/* Handle Decision Logic Visualization */}
                                                        {node.type === 'decision' && node.branches && (
                                                            <div className="flex flex-col w-full relative h-20 mb-4">
                                                                {/* Vertical line out */}
                                                                <div className="absolute left-1/2 -translate-x-1/2 top-0 h-4 w-px bg-slate-300"></div>
                                                                
                                                                {/* Horizontal branch line */}
                                                                <div className="absolute left-[20%] right-[20%] top-4 h-px bg-slate-300 border-t border-slate-300"></div>
                                                                
                                                                {/* Branches */}
                                                                <div className="flex justify-between w-full px-[15%] mt-4">
                                                                    {/* Left Branch (No) */}
                                                                    <div className="flex flex-col items-center">
                                                                        <div className="h-4 w-px bg-red-300"></div>
                                                                        <div className="px-3 py-1 bg-red-50 text-red-600 text-xs rounded border border-red-200 mt-1">
                                                                            {node.branches[0].label}
                                                                        </div>
                                                                        <div className="text-[10px] text-slate-400 mt-1">{node.branches[0].desc}</div>
                                                                        {/* Return path visual hint */}
                                                                        <div className="text-[10px] text-slate-300 mt-1">⮌ 回退</div>
                                                                    </div>

                                                                    {/* Right Branch (Yes) */}
                                                                    <div className="flex flex-col items-center">
                                                                        <div className="h-4 w-px bg-green-300"></div>
                                                                        <div className="px-3 py-1 bg-green-50 text-green-600 text-xs rounded border border-green-200 mt-1">
                                                                            {node.branches[1].label}
                                                                        </div>
                                                                        <div className="h-4 w-px bg-slate-300 mt-2"></div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </React.Fragment>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="mt-6 text-center text-slate-400 text-sm">
                                    基于简道云标准作业程序整理 • 可视化流程图
                                </div>
                            </div>
                        )}

                        {/* Modal for Workflow Details (Same as before) */}
                        {selectedStep && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm" onClick={() => setSelectedStep(null)}>
                                <div className="relative w-full max-w-lg bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate-in zoom-in duration-300 mx-4" onClick={(e) => e.stopPropagation()}>
                                    <div className="bg-slate-50 px-6 py-5 border-b border-slate-200 flex justify-between items-center">
                                        <div>
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs font-bold">任务详情</span>
                                                <span className="text-slate-400 text-sm">#{selectedStep.id}</span>
                                            </div>
                                            <h3 className="text-xl font-bold text-slate-900">{selectedStep.title}</h3>
                                        </div>
                                        <button onClick={() => setSelectedStep(null)} className="p-2 hover:bg-slate-200 rounded-full transition-colors">
                                            <Icon name="x" className="w-5 h-5 text-slate-500" />
                                        </button>
                                    </div>
                                    <div className="p-6 overflow-y-auto flex-1 space-y-6">
                                        <div className="flex items-start gap-3 p-4 bg-blue-50 rounded-xl border border-blue-100">
                                            <Icon name="users" className="w-5 h-5 text-blue-600 mt-0.5" />
                                            <div>
                                                <h4 className="text-sm font-bold text-blue-800 uppercase mb-1">责任人 / Owner</h4>
                                                <div className="flex flex-wrap gap-2">
                                                    {selectedStep.roles.map(role => (
                                                        <span key={role} className="bg-white px-2 py-1 rounded border border-blue-200 text-blue-700 text-sm font-medium">{role}</span>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                        {selectedStep.tools && selectedStep.tools.length > 0 && (
                                            <div>
                                                <h4 className="text-sm font-bold text-slate-500 uppercase mb-2 flex items-center gap-2">
                                                    <Icon name="briefcase" className="w-4 h-4" /> 推荐工具
                                                </h4>
                                                <div className="flex flex-wrap gap-2">
                                                    {selectedStep.tools.map(tool => (
                                                        <span key={tool} className="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-sm font-medium border border-slate-200">{tool}</span>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        <div>
                                            <h4 className="text-sm font-bold text-slate-500 uppercase mb-3 flex items-center gap-2">
                                                <Icon name="clipboard-list" className="w-4 h-4" /> 执行清单
                                            </h4>
                                            <ul className="space-y-3">
                                                {selectedStep.tasks.map((task, i) => (
                                                    <li key={i} className="flex gap-3 text-slate-700">
                                                        <Icon name="check-circle-2" className="w-5 h-5 text-slate-300 flex-shrink-0 mt-0.5" />
                                                        <span>{task}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                        <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                                            <h4 className="text-sm font-bold text-emerald-800 uppercase mb-2 flex items-center gap-2">
                                                <Icon name="file-text" className="w-4 h-4" /> 交付成果
                                            </h4>
                                            <ul className="list-disc list-inside text-emerald-900 text-sm space-y-1">
                                                {selectedStep.outputs.map((o, i) => <li key={i}>{o}</li>)}
                                            </ul>
                                        </div>
                                        {selectedStep.notes && (
                                            <div className="flex gap-2 items-start text-amber-700 text-sm bg-amber-50 p-3 rounded-lg border border-amber-100">
                                                <Icon name="alert-circle" className="w-4 h-4 mt-0.5 flex-shrink-0" />
                                                <span>{selectedStep.notes}</span>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Scroll to Top Button */}
                        <button 
                            onClick={scrollToTop}
                            className={`fixed bottom-8 right-8 p-3 bg-blue-600 text-white rounded-full shadow-lg transition-all duration-300 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 z-50 ${showScrollTop ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10 pointer-events-none'}`}
                            title="回到顶部"
                        >
                            <Icon name="arrow-up" className="w-6 h-6" />
                        </button>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SOPTimelineDashboard />);
    </script>
</body>
</html>
